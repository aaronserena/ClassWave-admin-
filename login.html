<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — ClassWave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
</head>
<body>

  <div class="login-container">
    <!-- Left Side: Branding/Visuals -->
    <div class="login-visual">
      <div class="doodle-overlay"></div>
      <div class="visual-content">
        <div class="login-logo">
          <img src="loginlogo.png" alt="ClassWave Logo">
        </div>
        <h1 class="visual-title">Class<span>Wave</span></h1>
        <p class="visual-subtitle">The next generation of academic schedule management. Seamless, intuitive, and powerful.</p>
      </div>
      <div class="visual-footer">
        <span>© 2024 ClassWave Systems</span>
      </div>
    </div>

    <!-- Right Side: Login Form -->
    <div class="login-form-area">
      <div class="form-wrapper">
        <div class="form-header">
          <h2 class="form-title">Admin Sign In</h2>
          <p class="form-subtitle">Please enter your credentials to access the dashboard.</p>
        </div>

        <form id="login-form" class="auth-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" id="username" class="form-input" placeholder="Enter username" autocomplete="username">
            </div>
          </div>

          <div class="form-group">
            <div class="label-row">
              <label class="form-label" for="password">Password</label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
            </div>
          </div>

          <div class="form-row mb-4">
            <label class="checkbox-wrapper">
              <input type="checkbox" id="remember">
              <span class="checkmark"></span>
              Keep me logged in
            </label>
          </div>

          <button type="submit" class="login-btn" id="login-btn">
            <span>Sign In to Dashboard</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
        </form>

        <div class="form-footer">
          <p>Don't have an admin account? <a href="#">Contact Support</a></p>
        </div>
      </div>
    </div>
  </div>

  <div class="login-toast hidden" id="login-toast"></div>

  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
